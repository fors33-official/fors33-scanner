name: 'FORS33 Data Liability Scanner'
description: 'Quantify attested vs unattested data bytes using .f33 sidecars. Read-only, zero network calls.'
branding:
  icon: alert-triangle
  color: orange
inputs:
  root:
    description: 'Root directory to scan (default: ${{ github.workspace }})'
    required: false
  threshold-mb:
    description: 'Minimum file size in MB to include in liability accounting (default: 1.0)'
    required: false
  json:
    description: 'If "true", emit JSON summary instead of human-readable output'
    required: false
runs:
  using: 'docker'
  image: 'docker://ghcr.io/fors33/fors33-scanner:0.6.0'
  args:
    - ${{ inputs.root }}
    - ${{ inputs.threshold-mb }}
    - ${{ inputs.json }}
