# Build and push fors33-scanner to GHCR and Docker Hub.
# GHCR: ghcr.io/fors33-official/fors33-scanner
# Docker Hub: docker.io/fors33/fors33-scanner
# Required secrets: DOCKERHUB_USERNAME (e.g. jhartman23), DOCKERHUB_TOKEN (Docker Hub PAT).

name: Build and push fors33-scanner Docker image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=latest
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: https://index.docker.io/v1/
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/fors33-official/fors33-scanner:${{ steps.meta.outputs.version }}
            ghcr.io/fors33-official/fors33-scanner:latest
            docker.io/fors33/fors33-scanner:${{ steps.meta.outputs.version }}
            docker.io/fors33/fors33-scanner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
