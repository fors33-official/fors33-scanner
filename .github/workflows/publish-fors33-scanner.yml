name: publish-fors33-scanner

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag with leading v (example: v0.8.4). Bare X.Y.Z is rejected.'
        required: true
        type: string
      push_latest:
        description: 'Also publish :latest tag'
        required: true
        default: true
        type: boolean

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: meta
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "Version input is required."
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^v[0-9] ]]; then
            echo "Version must be vX.Y.Z (leading v required). Got: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "push_latest=${{ inputs.push_latest }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: https://index.docker.io/v1/
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/fors33-official/fors33-scanner:${{ steps.meta.outputs.version }}
            docker.io/fors33/fors33-scanner:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Build and push latest tags
        if: ${{ steps.meta.outputs.push_latest == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/fors33-official/fors33-scanner:latest
            docker.io/fors33/fors33-scanner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Update Docker Hub repository description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: fors33/fors33-scanner
          readme-filepath: ./README.md
          enable-url-completion: true
          short-description: High-speed liability scanner for attested vs unattested data using .f33 sidecars.

